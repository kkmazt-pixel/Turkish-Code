# Continuous integration — Çekirdek (Python) gates.
# Runs the same four checks used locally: ruff, black, mypy (strict), pytest
# (doc 35 §7, doc 36 §9). Kabuk (Rust) and Arayüz (TS) jobs are added when those
# tiers land; this file grows with the product (doc 42 §13).

name: ci

on:
  push:
  pull_request:

jobs:
  cekirdek:
    name: Çekirdek (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (with dev tooling)
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Type check (mypy)
        run: mypy

      - name: Test (pytest)
        run: pytest -q
